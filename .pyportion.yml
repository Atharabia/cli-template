name: cli-template
source: https://github.com/pyportion/cli-template
version: 1.0.0
description: A CLI Template.
author: PyPortion Team
type: cli

portions:
    - name: command
      steps:
          - type: ask
            question: What is the command name?
            variable: command_name

          - type: copy
            from_path: ["handler.py"]
            to_path: ["cli", "handler", "$command_name.py"]

          - type: replace
            path: ["cli", "handler", "$command_name.py"]
            replacements:
                - keyword: COMMAND_CLASS_NAME
                  value: $command_name
                  mode: pascalcase

                - keyword: COMMAND_HANDLER_NAME
                  value: $command_name
                  mode: pascalcase

                - keyword: COMMAND_VAR_NAME
                  value: $command_name
                  mode: camelcase

                - keyword: COMMAND_FUNCTION_NAME
                  value: $command_name
                  mode: camelcase

          - type: copy
            from_path: ["command.py"]
            to_path: ["cli", "commands", "$command_name.py"]

          - type: replace
            path: ["cli", "commands", "$command_name.py"]
            replacements:
                - keyword: COMMAND_CLASS_NAME
                  value: $command_name
                  mode: pascalcase

                - keyword: COMMAND_NAME_FUNTION
                  value: $command_name
                  mode: camelcase

          - type: set_var
            key: command_class
            value: $command_name
            mode: titlecase

          - type: add_import
            path: ["cli", "commands", "__init__.py"]
            import_statement: "from .$command_name import $command_class"
          
          - type: add_to_list
            path: ["cli", "commands", "__init__.py"]
            list_name: "__all__"
            value: "$command_class"

    - name: model
      steps:
        - type: ask
          question: What is the model name?
          variable: model_name
        
        - type: copy
          from_path: ["model.py"]
          to_path: ["cli", "models", "$model_name.py"]


        - type: replace
          path: ["cli", "models", "$model_name.py"]
          replacements:
              - keyword: MODEL_CLASS_NAME
                value: $model_name
                mode: pascalcase

        - type: set_var
          key: model_class
          value: $model_name
          mode: titlecase

        - type: add_import
          path: ["cli", "models", "__init__.py"]
          import_statement: "from .$model_name import $model_class"
        
        - type: add_to_list
          path: ["cli", "models", "__init__.py"]
          list_name: "__all__"
          value: "$model_class"
